# ══════════════════════════════════════════════════
#  PARKMATE – application.properties
#
#  This file has TWO sections separated by "---"
#
#  SECTION 1 (top)    → always active (dev + prod)
#  SECTION 2 (bottom) → only active when profile=prod
#
#  Local PC:  runs Section 1 only  → H2 database
#  Render:    runs Section 1 + 2   → Supabase PostgreSQL
#             (Docker passes SPRING_PROFILES_ACTIVE=prod)
# ══════════════════════════════════════════════════

# ════════════════════════════════════════
#  SECTION 1 — ALWAYS ACTIVE (dev + prod)
# ════════════════════════════════════════

spring.application.name=parkmate

# ── SERVER ──
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,text/html

# ── JPA COMMON ──
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── H2 (DEV default — overridden in prod section below) ──
spring.datasource.url=jdbc:h2:mem:parkmatedb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=false

# ── JWT ──
parkmate.jwt.secret=${JWT_SECRET:ParkMateOlympiaTechParkDevSecretKey256BitsLong!!}
parkmate.jwt.expiry-ms=86400000

# ── CACHE ──
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# ── ACTUATOR — exposed here so health check always works ──
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ── LOGGING ──
logging.level.com.parkmate=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# ════════════════════════════════════════════════════════
#  SECTION 2 — PROD ONLY (active when profile=prod)
#  The "---" below is a YAML/properties document separator
#  Spring Boot reads this as a separate profile block
# ════════════════════════════════════════════════════════
---
spring.config.activate.on-profile=prod

# ── Supabase PostgreSQL ──
spring.datasource.url=jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.avxpxxlzumthpeahvpwt
spring.datasource.password=sureshraina@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (tuned for Supabase free tier: max 20 connections) ──
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=false

# ── Disable H2 console in prod ──
spring.h2.console.enabled=false

# ── Tighten logging in prod ──
logging.level.com.parkmate=INFO
logging.level.org.hibernate.SQL=WARN
